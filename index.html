<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5 projects with DOM</title>
    <link rel="stylesheet" href="style.css">

    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
</head>

<body>
    <!-- 1. Add friend Feature with same button -->
    <div id="top">
        <div id="card">
            <img src="img.jpg" alt="">
            <h1>LaughableLoves</h1>

            <h5>Stranger</h5>
            <div id="btn-container">
                <button id="add">Add Friend</button>
                <!-- <button id="remove">Remove</button> -->
            </div>
        </div>
        
        <!-- 2. Insta like btn  -->
        <div id="container">
            <img src="img2.jpg" alt="">
            <i class="ri-heart-3-fill"></i>
        </div>
        
        <!-- 3. Custom cursor -->
        <div id="main">
            <div class="cursor"></div>
            <h1>NotYourKoder</h1>
        </div>
    </div>

    <!-- 4. Multiple Image hovering Animation -->
    <div id="main2">
        <div id="elem1" class="elem">
            <h1>Red Dino Ranger</h1>
            <img src="https://morphinlegacy.com/wp-content/uploads/2025/02/Red-Dino-Ranger-History.png" alt="">
        </div>
        <div class="elem">
            <h1>Yellow Dino Ranger</h1>
            <img src="https://morphinlegacy.com/wp-content/uploads/2025/02/Yellow-Dino-Ranger-History-1.png" alt="">
        </div>
        <div class="elem">
            <h1>Blue Dino Ranger</h1>
            <img src="https://morphinlegacy.com/wp-content/uploads/2025/02/Blue-Dino-Ranger-History.png" alt="">
        </div>
        <div class="elem">
            <h1>Black Dino Ranger</h1>
            <img src="https://morphinlegacy.com/wp-content/uploads/2022/09/Brachio-Staff.png" alt="">
        </div>
        <div class="elem">
            <h1>White Dino Ranger</h1>
            <img src="https://morphinlegacy.com/wp-content/uploads/2022/09/White-Drago-Sword-Dagger-Mode.png" alt="">
        </div>
    </div>

    
    <!-- 5. Insta Story Feature -->
    <div id="main3">
        <div id="box">
            <h2>LEGOgram</h2>
            <div id="full-screen">

            </div>
            <div id="stories">
                
            </div>
        </div>
    </div>


    <script src="script.js"></script>
</body>

</html>
